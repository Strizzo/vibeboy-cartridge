name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package cartridge
        run: |
          tar czf dev.cartridge.vibeboy.tar.gz \
            cartridge.json main.lua api.lua ui.lua \
            screens/ icon.png

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dev.cartridge.vibeboy.tar.gz
